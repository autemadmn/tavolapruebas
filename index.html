<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavola Chiringo | Carta digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="menu-shell">
    <section class="intro" aria-label="Restaurante Tavola Chiringo">
      <h1 class="brand-title">
        <img class="brand-logo" src="assets/logotavola.png" alt="Tavola Chiringo">
      </h1>
      <p class="intro-copy">Carta digital</p>
    </section>

    <nav class="category-tabs top-tabs" id="topTabs" aria-label="Categorías de la carta"></nav>

    <section class="menu-layout" aria-label="Carta interactiva">
      <aside class="menu-list" id="menuList" aria-label="Productos de la categoría seleccionada"></aside>

      <article class="dish-preview" id="dishPreview" aria-live="polite" tabindex="-1">
        <div class="image-frame menu-item-image" id="imageFrame" role="button" tabindex="0" aria-label="Ampliar imagen del plato">
          <img id="dishImage" src="assets/desayuno-tradicional.png" alt="Desayuno tradicional">
        </div>
        <div class="preview-copy">
          <p id="dishCategory">Desayuno</p>
          <h2 id="dishTitle">Desayuno tradicional</h2>
          <span id="dishPrice">6,50 €</span>
          <p id="dishDescription">Café o té/infusión + zumo + tostada a elegir: aceite, mermelada, tomate, mantequilla o bollería.</p>
          <p class="dish-note is-hidden" id="dishNote"></p>
          <p class="sr-only" id="dishStatus">Plato seleccionado: Desayuno tradicional.</p>
        </div>
      </article>
    </section>
  </main>

  <nav class="category-tabs bottom-tabs" id="bottomTabs" aria-label="Cambiar sección de la carta"></nav>

  <div class="image-lightbox" id="imageLightbox" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Imagen ampliada">
    <button class="image-lightbox-close" id="imageLightboxClose" type="button" aria-label="Cerrar imagen ampliada">×</button>
    <div class="image-lightbox-panel">
      <img class="image-lightbox-img" id="imageLightboxImg" src="" alt="">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
